<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Référence Logistique — Termes, Manutention & Matières Dangereuses</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f3f7;--surface:#fff;--surface2:#e8edf4;--border:#d0d9e6;--border-active:#a8bcda;--accent:#c47f00;--accent2:#007a64;--accent3:#c43a3a;--text:#2a3544;--text-dim:#7a8fa6;--text-bright:#0f1c2e;--shadow:0 1px 4px rgba(30,60,100,.07);--shadow-md:0 4px 16px rgba(30,60,100,.1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden}

/* HEADER */
header{position:sticky;top:0;border-bottom:1px solid var(--border);padding:0 40px;background:#fff;z-index:100;box-shadow:var(--shadow)}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:stretch;gap:0}
.logo-area{display:flex;align-items:center;gap:14px;padding:16px 28px 16px 0;border-right:1px solid var(--border);margin-right:8px;flex-shrink:0}
.logo-icon{width:38px;height:38px;background:var(--accent);display:flex;align-items:center;justify-content:center;clip-path:polygon(0 0,84% 0,100% 50%,84% 100%,0 100%)}
.logo-icon svg{color:#fff}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-bright);line-height:1.1}
.logo-text span{display:block;font-size:9px;font-weight:500;letter-spacing:.18em;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-top:2px}
nav{display:flex;align-items:stretch;flex:1}
.nav-btn{padding:0 20px;border:none;background:transparent;color:var(--text-dim);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:7px;white-space:nowrap}
.nav-btn:hover{color:var(--text);background:var(--bg)}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:#fff9ee}
.nav-icon{font-size:15px}
.header-badges{display:flex;align-items:center;gap:8px;margin-left:auto;padding-left:16px;flex-shrink:0}
.badge{font-family:'JetBrains Mono',monospace;font-size:9px;padding:4px 10px;letter-spacing:.1em;text-transform:uppercase;border-radius:2px;font-weight:500}
.badge-imdg{background:rgba(196,127,0,.1);border:1px solid rgba(196,127,0,.3);color:var(--accent)}
.badge-iso{background:rgba(0,122,100,.08);border:1px solid rgba(0,122,100,.25);color:var(--accent2)}

/* MAIN */
main{max-width:1400px;margin:0 auto;padding:0 40px 80px}
.section{display:none}
.section.active{display:block}

/* HERO */
.section-hero{padding:40px 0 28px;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;border-bottom:1px solid var(--border);margin-bottom:32px}
.section-hero h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(32px,4.5vw,56px);font-weight:800;text-transform:uppercase;letter-spacing:.02em;color:var(--text-bright);line-height:.95}
.section-hero h1 em{font-style:normal;color:var(--accent)}
.section-hero p{max-width:460px;color:var(--text-dim);font-size:14px;line-height:1.75;margin-top:12px}
.section-meta{display:flex;gap:28px;align-items:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:.06em;flex-shrink:0}
.meta-item strong{display:block;font-size:22px;font-family:'Barlow Condensed',sans-serif;font-weight:800;color:var(--accent);letter-spacing:0}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap}
.search-input{background:#fff;border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:9px 16px;outline:none;transition:border-color .2s;width:270px;box-shadow:var(--shadow)}
.search-input::placeholder{color:var(--text-dim)}
.search-input:focus{border-color:var(--accent)}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.filter-chip{padding:7px 14px;border:1px solid var(--border);background:#fff;color:var(--text-dim);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.filter-chip:hover{border-color:var(--border-active);color:var(--text)}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:none}

/* TERMS */
.terms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.term-card{background:#fff;border:1px solid var(--border);padding:22px;cursor:pointer;transition:all .2s;position:relative;box-shadow:var(--shadow);border-left:4px solid transparent}
.term-card:hover{border-color:var(--border-active);box-shadow:var(--shadow-md);border-left-color:var(--border-active)}
.term-card.expanded{border-left-color:var(--accent);box-shadow:var(--shadow-md)}
.term-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.term-abbr{font-family:'Barlow Condensed',sans-serif;font-size:25px;font-weight:800;letter-spacing:.02em;color:var(--text-bright);line-height:1}
.term-type-badge{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;flex-shrink:0;margin-top:3px;border-radius:2px}
.type-door{background:rgba(196,127,0,.08);border:1px solid rgba(196,127,0,.25);color:var(--accent)}
.type-liner{background:rgba(0,122,100,.08);border:1px solid rgba(0,122,100,.25);color:var(--accent2)}
.type-free{background:rgba(196,58,58,.08);border:1px solid rgba(196,58,58,.25);color:var(--accent3)}
.type-cy{background:rgba(40,100,200,.08);border:1px solid rgba(40,100,200,.25);color:#2a6acc}
.type-surcharge{background:rgba(100,50,180,.08);border:1px solid rgba(100,50,180,.25);color:#6a32b0}
.term-full-name{font-size:12px;color:var(--text-dim);font-style:italic;margin-bottom:10px}
.term-summary{font-size:13.5px;color:var(--text);line-height:1.6}
.term-details{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);animation:fadeSlide .2s ease}
.term-card.expanded .term-details{display:block}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.thc-diagram{margin-top:12px;display:flex;border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.thc-segment{flex:1;padding:8px 6px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'JetBrains Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.04em;border-right:1px solid rgba(0,0,0,.06)}
.thc-segment:last-child{border-right:none}
.thc-segment svg{width:13px;height:13px}
.seg-included{background:rgba(0,122,100,.07);color:var(--accent2)}
.seg-excluded{background:rgba(196,58,58,.07);color:var(--accent3)}

/* DIVIDER */
.section-divider{display:flex;align-items:center;gap:14px;margin:38px 0 18px}
.section-divider h2{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:var(--text-dim);white-space:nowrap}
.section-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* MARKS */
.marks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px}
.mark-card{background:#fff;border:1px solid var(--border);padding:22px 16px;text-align:center;cursor:pointer;transition:all .25s;box-shadow:var(--shadow);border-top:3px solid transparent}
.mark-card:hover{box-shadow:var(--shadow-md);border-top-color:var(--accent);transform:translateY(-2px)}
.mark-icon{width:62px;height:62px;margin:0 auto 12px;transition:transform .3s}
.mark-card:hover .mark-icon{transform:scale(1.08)}
.mark-icon svg{width:100%;height:100%}
.mark-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-bright);margin-bottom:4px}
.mark-code{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:.08em}

/* MARK OVERLAY */
.mark-detail-overlay{display:none;position:fixed;inset:0;background:rgba(20,40,70,.4);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px);animation:fadeIn .2s ease}
.mark-detail-overlay.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.mark-detail-panel{background:#fff;border:1px solid var(--border);max-width:480px;width:92%;padding:40px;position:relative;box-shadow:var(--shadow-md);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.panel-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:20px;transition:color .2s}
.panel-close:hover{color:var(--text-bright)}
.panel-icon{width:88px;height:88px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center}
.panel-icon svg{width:100%;height:100%}
.panel-code{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:.15em;margin-bottom:6px;text-align:center}
.panel-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;text-transform:uppercase;color:var(--text-bright);text-align:center;margin-bottom:14px}
.panel-desc{font-size:13.5px;line-height:1.75;color:var(--text);text-align:center;margin-bottom:18px}
.panel-usage{background:var(--bg);border:1px solid var(--border);padding:14px 18px;font-size:13px;color:var(--text-dim);line-height:1.6;border-radius:2px}
.panel-usage strong{display:block;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--accent2);margin-bottom:6px}

/* DANGEROUS GOODS */
.dg-layout{display:grid;grid-template-columns:275px 1fr;gap:18px;align-items:start}
.dg-sidebar{background:#fff;border:1px solid var(--border);box-shadow:var(--shadow);position:sticky;top:80px}
.dg-sidebar-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);padding:14px 18px 10px;border-bottom:1px solid var(--border)}
.dg-class-btn{width:100%;display:flex;align-items:center;gap:12px;padding:11px 16px;border:none;background:transparent;cursor:pointer;text-align:left;border-bottom:1px solid var(--border);transition:all .18s;border-left:4px solid transparent}
.dg-class-btn:last-child{border-bottom:none}
.dg-class-btn:hover{background:var(--bg)}
.dg-class-btn.active{background:#fff9ee;border-left-color:var(--accent)}
.dg-class-diamond{width:34px;height:34px;flex-shrink:0}
.dg-class-diamond svg{width:100%;height:100%}
.dg-class-info{flex:1;min-width:0}
.dg-class-num{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--text-dim);text-transform:uppercase}
.dg-class-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--text-bright);line-height:1.2;text-transform:uppercase;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dg-class-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);margin-left:auto;flex-shrink:0;background:var(--bg);border:1px solid var(--border);border-radius:2px;padding:2px 7px}
.dg-content{background:#fff;border:1px solid var(--border);box-shadow:var(--shadow)}
.dg-content-header{display:flex;align-items:flex-start;gap:20px;padding:26px 28px;border-bottom:1px solid var(--border)}
.dg-big-diamond{width:76px;height:76px;flex-shrink:0}
.dg-big-diamond svg{width:100%;height:100%}
.dg-header-class{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase}
.dg-header-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;text-transform:uppercase;color:var(--text-bright);letter-spacing:.03em;line-height:1;margin-bottom:8px}
.dg-header-desc{font-size:13px;color:var(--text-dim);line-height:1.65;max-width:580px}
.dg-subs{padding:22px 28px}
.dg-subs-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px}
.dg-sub-list{display:flex;flex-direction:column;gap:10px}
.dg-sub-item{display:flex;align-items:stretch;border:1px solid var(--border);overflow:hidden;background:#fff;transition:box-shadow .2s}
.dg-sub-item:hover{box-shadow:var(--shadow-md)}
.dg-sub-color{width:5px;flex-shrink:0}
.dg-sub-body{flex:1;padding:14px 16px}
.dg-sub-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.dg-sub-num{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--text-bright);line-height:1}
.dg-sub-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--text-bright);text-transform:uppercase;letter-spacing:.04em}
.dg-sub-desc{font-size:13px;color:var(--text);line-height:1.65;margin-bottom:8px}
.dg-examples{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.dg-example-tag{background:var(--bg);border:1px solid var(--border);padding:3px 10px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);border-radius:2px}
.dg-sub-diamond{width:48px;height:48px;flex-shrink:0;margin:14px 16px 14px 0;align-self:flex-start}
.dg-sub-diamond svg{width:100%;height:100%}
.dg-info-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.dg-info-tag{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 10px;border-radius:2px;letter-spacing:.05em}
.dg-tag-danger{background:rgba(196,58,58,.08);border:1px solid rgba(196,58,58,.2);color:var(--accent3)}
.dg-tag-color{background:rgba(196,127,0,.08);border:1px solid rgba(196,127,0,.2);color:var(--accent)}
.dg-tag-reg{background:rgba(40,100,200,.08);border:1px solid rgba(40,100,200,.2);color:#2a6acc}
.dg-empty{padding:60px;text-align:center;color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:12px}

/* MISC */
.no-results{grid-column:1/-1;text-align:center;padding:60px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:12px}
footer{border-top:1px solid var(--border);padding:22px 40px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:.08em;background:#fff}
.reveal{opacity:0;transform:translateY(10px);transition:opacity .35s ease,transform .35s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* ═══════════════════════════════════════
   CALCULATOR SECTION
═══════════════════════════════════════ */
.calc-layout{display:grid;grid-template-columns:420px 1fr;gap:24px;align-items:start}
.calc-panel{background:#fff;border:1px solid var(--border);box-shadow:var(--shadow);padding:28px}
.calc-panel-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.form-group{margin-bottom:18px}
.form-label{display:block;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px}
.form-select,.form-input{width:100%;background:#fff;border:1px solid var(--border);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;padding:10px 14px;outline:none;transition:border-color .2s;box-shadow:var(--shadow);-webkit-appearance:none;appearance:none;cursor:pointer}
.form-select:focus,.form-input:focus{border-color:var(--accent)}
.form-input{cursor:text}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.select-wrap{position:relative}
.select-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none;font-size:12px}
.calc-btn{width:100%;padding:13px;background:var(--accent);border:none;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:background .2s;margin-top:8px}
.calc-btn:hover{background:#a86c00}
.calc-btn-reset{width:100%;padding:10px;background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:8px}
.calc-btn-reset:hover{border-color:var(--border-active);color:var(--text)}

/* Results panel */
.result-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;border:2px dashed var(--border);color:var(--text-dim)}
.result-empty svg{margin-bottom:16px;opacity:.35}
.result-empty p{font-size:14px;line-height:1.7}

.result-header{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.result-kpi{background:#fff;border:1px solid var(--border);padding:20px;text-align:center;box-shadow:var(--shadow)}
.kpi-value{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:800;color:var(--accent);line-height:1}
.kpi-value.green{color:var(--accent2)}
.kpi-value.red{color:var(--accent3)}
.kpi-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-top:6px}
.kpi-sub{font-size:12px;color:var(--text-dim);margin-top:4px}

/* Container visual */
.container-visual-wrap{background:#fff;border:1px solid var(--border);padding:24px;box-shadow:var(--shadow);margin-bottom:20px}
.container-visual-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text-dim);margin-bottom:16px}
.container-svg-wrap{width:100%;overflow:hidden}
.container-svg-wrap svg{width:100%;height:auto;display:block}

/* Detail table */
.result-detail{background:#fff;border:1px solid var(--border);padding:24px;box-shadow:var(--shadow)}
.detail-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.detail-table{width:100%;border-collapse:collapse;font-size:13px}
.detail-table th{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg)}
.detail-table td{padding:10px 12px;border-bottom:1px solid var(--surface2);vertical-align:middle}
.detail-table tr:last-child td{border-bottom:none}
.detail-table .val{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--text-bright)}
.detail-table .unit{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.tag-ok{background:rgba(0,122,100,.08);border:1px solid rgba(0,122,100,.2);color:var(--accent2);padding:3px 8px;font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:.08em}
.tag-warn{background:rgba(196,127,0,.08);border:1px solid rgba(196,127,0,.2);color:var(--accent);padding:3px 8px;font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:.08em}
.tag-danger{background:rgba(196,58,58,.08);border:1px solid rgba(196,58,58,.2);color:var(--accent3);padding:3px 8px;font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:.08em}

/* Weight bar */
.weight-bar-wrap{margin-top:12px}
.weight-bar-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;display:flex;justify-content:space-between}
.weight-bar{height:10px;background:var(--surface2);border-radius:2px;overflow:hidden;position:relative}
.weight-bar-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.16,1,.3,1)}
.weight-bar-fill.ok{background:var(--accent2)}
.weight-bar-fill.warn{background:var(--accent)}
.weight-bar-fill.danger{background:var(--accent3)}

/* Pallet type info box */
.pallet-info-box{background:var(--bg);border:1px solid var(--border);padding:14px 16px;margin-top:12px;font-size:13px}
.pallet-info-box strong{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--text-bright)}
.pallet-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-top:8px;font-size:12px;color:var(--text-dim)}
.pallet-info-grid b{color:var(--text);font-weight:600}

/* Stacking toggle */
.toggle-row{display:flex;align-items:center;gap:10px;padding:10px 0}
.toggle-label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);flex:1}
.toggle{position:relative;width:42px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border);transition:.3s;border-radius:22px;cursor:pointer}
.toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;transition:.3s;border-radius:50%}
.toggle input:checked+.toggle-slider{background:var(--accent2)}
.toggle input:checked+.toggle-slider::before{transform:translateX(20px)}

@media(max-width:1100px){.calc-layout{grid-template-columns:1fr}}
@media(max-width:900px){.result-header{grid-template-columns:1fr 1fr}.form-row-3{grid-template-columns:1fr 1fr}}

</div>

    <div>
      <h1>Matières <em>Dangereuses</em><br>Code IMDG</h1>

<!-- ═══════════════════ CALCULATEUR DE CHARGEMENT ═══════════════════ -->
<div class="section" id="section-calculator">
  <div class="section-hero">
    <div>
      <h1>Calculateur de <em>Chargement</em><br>en Palettes</h1>
      <p>Calculez la capacité d'un conteneur en nombre de palettes, l'espace non utilisé, la charge totale et le taux de remplissage selon le type de conteneur et le type de palette.</p>
    </div>
    <div class="section-meta">
      <div class="meta-item"><strong>8</strong>Conteneurs</div>
      <div class="meta-item"><strong>14</strong>Types de palettes</div>
      <div class="meta-item"><strong>ISO</strong>6780:2011</div>
    </div>
  </div>

  <div class="calc-layout">
    <!-- LEFT: FORM -->
    <div>
      <!-- Container -->
      <div class="calc-panel" style="margin-bottom:16px">
        <div class="calc-panel-title">🚢 Type de conteneur</div>
        <div class="form-group">
          <label class="form-label">Sélectionner le conteneur</label>
          <div class="select-wrap">
            <select class="form-select" id="calc-container" onchange="updateContainerInfo()">
              <option value="20std">20' Standard (Dry/TEU)</option>
              <option value="40std" selected>40' Standard (Dry/FEU)</option>
              <option value="40hc">40' High Cube (HC)</option>
              <option value="45hc">45' High Cube (HC)</option>
              <option value="20reefer">20' Reefer</option>
              <option value="40reefer">40' Reefer HC</option>
              <option value="40pw">40' Pallet Wide (2.5m)</option>
              <option value="45pw">45' Pallet Wide (2.5m)</option>
            </select>
          </div>
        </div>
        <div class="pallet-info-box" id="container-info-box">
          <strong id="ci-name">40' Standard</strong>
          <div class="pallet-info-grid">
            <div>Longueur int. <b id="ci-l">—</b></div>
            <div>Largeur int. <b id="ci-w">—</b></div>
            <div>Hauteur int. <b id="ci-h">—</b></div>
            <div>Volume utile <b id="ci-vol">—</b></div>
            <div>Charge utile <b id="ci-payload">—</b></div>
            <div>Tare <b id="ci-tare">—</b></div>
          </div>
        </div>
      </div>

      <!-- Palette -->
      <div class="calc-panel" style="margin-bottom:16px">
        <div class="calc-panel-title">📦 Type de palette</div>
        <div class="form-group">
          <label class="form-label">Sélectionner la palette</label>
          <div class="select-wrap">
            <select class="form-select" id="calc-pallet" onchange="updatePalletInfo()">
              <optgroup label="Europe">
                <option value="eur1" selected>EUR 1 — 800 × 1200 mm (EPAL)</option>
                <option value="eur2">EUR 2 — 1000 × 1200 mm</option>
                <option value="eur3">EUR 3 — 1000 × 1200 mm (variante)</option>
                <option value="eur6">EUR 6 — 600 × 800 mm (demi)</option>
                <option value="half">Demi palette — 600 × 400 mm</option>
              </optgroup>
              <optgroup label="Amérique du Nord">
                <option value="gma">GMA Standard — 1016 × 1219 mm (40"×48")</option>
                <option value="na42">42" × 42" — 1067 × 1067 mm</option>
                <option value="na48">48" × 48" — 1219 × 1219 mm</option>
                <option value="na4842">48" × 42" — 1219 × 1067 mm</option>
                <option value="na4040">40" × 40" — 1016 × 1016 mm</option>
                <option value="na4845">48" × 45" — 1219 × 1143 mm</option>
              </optgroup>
              <optgroup label="Asie / Australie">
                <option value="aus">Australie — 1165 × 1165 mm</option>
                <option value="asia1100">Asie — 1100 × 1100 mm</option>
                <option value="custom">Palette personnalisée…</option>
              </optgroup>
            </select>
          </div>
        </div>
        <!-- Custom palette inputs -->
        <div id="custom-pallet-inputs" style="display:none">
          <div class="form-row" style="margin-bottom:12px">
            <div class="form-group" style="margin:0">
              <label class="form-label">Largeur (mm)</label>

            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Longueur (mm)</label>
              <input class="form-input" type="number" id="custom-l" value="800" min="100" max="2000" oninput="updatePalletInfo()">
            </div>
          </div>
          <div class="form-row" style="margin-bottom:12px">
            <div class="form-group" style="margin:0">
              <label class="form-label">Poids palette vide (kg)</label>
              <input class="form-input" type="number" id="custom-pw" value="25" min="1" max="200" oninput="updatePalletInfo()">
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Charge max (kg)</label>
              <input class="form-input" type="number" id="custom-pl" value="1000" min="100" max="5000" oninput="updatePalletInfo()">
            </div>
          </div>
        </div>
        <div class="pallet-info-box" id="pallet-info-box">
          <strong id="pi-name">EUR 1</strong>
          <div class="pallet-info-grid">
            <div>Dimensions <b id="pi-dims">—</b></div>
            <div>Poids palette <b id="pi-weight">—</b></div>
            <div>Charge utile max <b id="pi-maxload">—</b></div>
            <div>Espace au sol <b id="pi-area">—</b></div>
          </div>
        </div>
      </div>

      <!-- Charge & options -->
      <div class="calc-panel" style="margin-bottom:16px">
        <div class="calc-panel-title">⚖️ Charge & configuration</div>
        <div class="form-group">
          <label class="form-label">Nombre de palettes chargées</label>
          <input class="form-input" type="number" id="calc-qty" value="20" min="1" max="500" oninput="calculate()">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Poids marchandise / palette (kg)</label>
            <input class="form-input" type="number" id="calc-cargo-weight" value="500" min="0" max="30000" oninput="calculate()">
          </div>
          <div class="form-group">
            <label class="form-label">Hauteur chargée / palette (mm)</label>
            <input class="form-input" type="number" id="calc-pallet-height" value="1400" min="100" max="3000" oninput="calculate()">
          </div>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Empilage double niveau (si hauteur le permet)</span>
          <label class="toggle"><input type="checkbox" id="calc-stack" onchange="calculate()"><span class="toggle-slider"></span></label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Orientation tête-bêche (optimisation mixte)</span>
          <label class="toggle"><input type="checkbox" id="calc-mixed" onchange="calculate()"><span class="toggle-slider"></span></label>
        </div>
      </div>

      <button class="calc-btn" onclick="calculate()">⟳ Calculer le chargement</button>
      <button class="calc-btn-reset" onclick="resetCalc()">Réinitialiser</button>
    </div>

    <!-- RIGHT: RESULTS -->
    <div id="calc-results">
      <div class="result-empty">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        <p>Configurez le conteneur et la palette,<br>puis cliquez sur <strong>Calculer</strong> pour afficher les résultats.</p>
      </div>
    </div>
  </div>
</div>

</main>

/* ══ STATE ══ */
let linerFilter='all', markFilter='all', activeDGClass=null;

/* ══ NAVIGATION ══ */
function showSection(name,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('section-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(name==='handling') renderMarks();
  if(name==='dangerous') renderDGClasses();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ══ FILTER ══ */
function setFilter(val,btn,ctx){
  if(ctx==='liner') linerFilter=val;
  else if(ctx==='mark') markFilter=val;
  btn.closest('.filter-group').querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  if(ctx==='liner') renderTerms();
  else if(ctx==='mark') renderMarks();
}

/* ══ LINER TERMS ══ */
function renderTerms(){
  const q=document.getElementById('liner-search').value.toLowerCase();
  const filt=t=>(linerFilter==='all'||t.type===linerFilter)&&(!q||t.abbr.toLowerCase().includes(q)||t.summary.toLowerCase().includes(q));
  document.getElementById('terms-grid').innerHTML=LINER_TERMS.filter(filt).map(termCard).join('')||'<div class="no-results">Aucun terme trouvé.</div>';
  document.getElementById('surcharge-grid').innerHTML=SURCHARGES.filter(t=>(linerFilter==='all'||linerFilter==='surcharge')&&(!q||t.abbr.toLowerCase().includes(q)||t.summary.toLowerCase().includes(q))).map(termCard).join('');
  observeReveal();
}
function termCard(t){
  const diag=t.segments.length?`<div class="thc-diagram">${t.segments.map(s=>`<div class="thc-segment seg-${s.s}">${s.s==='included'?`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`}<span>${s.l}</span></div>`).join('')}</div>`:'';
  return `<div class="term-card reveal" onclick="toggleTerm(this)"><div class="term-header"><div class="term-abbr">${t.abbr}</div><span class="term-type-badge type-${t.type}">${t.typeLabel}</span></div>${t.fullName?`<div class="term-full-name">${t.fullName}</div>`:''}<div class="term-summary">${t.summary}</div><div class="term-details"><p style="font-size:13px;color:var(--text);line-height:1.7">${t.details}</p>${diag}</div></div>`;
}
function toggleTerm(el){
  const open=el.classList.contains('expanded');
  document.querySelectorAll('.term-card.expanded').forEach(c=>c.classList.remove('expanded'));
  if(!open) el.classList.add('expanded');
}

/* ══ MARKS ══ */
function renderMarks(){
  const q=document.getElementById('mark-search').value.toLowerCase();
  const filtered=HANDLING_MARKS.filter(m=>(markFilter==='all'||m.category===markFilter)&&(!q||m.name.toLowerCase().includes(q)||m.code.toLowerCase().includes(q)));
  document.getElementById('marks-grid').innerHTML=filtered.length?filtered.map((m,i)=>`<div class="mark-card reveal" onclick="openMark(${HANDLING_MARKS.indexOf(m)})"><div class="mark-icon">${m.svg}</div><div class="mark-name">${m.name}</div><div class="mark-code">${m.code}</div></div>`).join(''):'<div class="no-results">Aucun symbole trouvé.</div>';
  observeReveal();
}
function openMark(idx){
  const m=HANDLING_MARKS[idx];
  document.getElementById('panel-icon').innerHTML=m.svg;
  document.getElementById('panel-code').textContent=m.code;
  document.getElementById('panel-title').textContent=m.name;
  document.getElementById('panel-desc').textContent=m.desc;
  document.getElementById('panel-usage').textContent=m.usage;
  document.getElementById('mark-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeOverlay(){document.getElementById('mark-overlay').classList.remove('open');document.body.style.overflow='';}
function closeMarkOverlay(e){if(e.target===document.getElementById('mark-overlay'))closeOverlay();}

// Core calculation
function calcPalletsFloor(cL, cW, pW, pL, mixed){
  // Orientation A: palette W along container W, L along container L
  const rowsA=Math.floor(cW/pW);
  const colsA=Math.floor(cL/pL);
  const fitA=rowsA*colsA;

  // Orientation B: palette rotated
  const rowsB=Math.floor(cW/pL);
  const colsB=Math.floor(cL/pW);
  const fitB=rowsB*colsB;

  if(!mixed) return {count:Math.max(fitA,fitB), orient:(fitA>=fitB?'A':'B'), rowsA,colsA,rowsB,colsB,fitA,fitB};

  // Mixed: try filling remaining space with rotated orientation
  // Best of A + leftover with B
  const remAfterA_L = cL - colsA*pL;
  const extraB_in_rem = Math.floor(cW/pL)*Math.floor(remAfterA_L/pW);
  const totalMixA = fitA + extraB_in_rem;

  const remAfterB_L = cL - colsB*pW;
  const extraA_in_rem = Math.floor(cW/pW)*Math.floor(remAfterB_L/pL);
  const totalMixB = fitB + extraA_in_rem;

  const best=Math.max(fitA,fitB,totalMixA,totalMixB);
  return {count:best, orient:'mixed', rowsA,colsA,rowsB,colsB,fitA,fitB};
}

function calculate(){
  const c=getContainer();
  const p=getPallet();
  const qty=+document.getElementById('calc-qty').value||1;
  const cargoWeightPerPallet=+document.getElementById('calc-cargo-weight').value||0;
  const loadedHeight=+document.getElementById('calc-pallet-height').value||1400;
  const stackEnabled=document.getElementById('calc-stack').checked;
  const mixedEnabled=document.getElementById('calc-mixed').checked;

  // Floor capacity
  const floor=calcPalletsFloor(c.L,c.W,p.W,p.L,mixedEnabled);
  let maxPallets=floor.count;
  let levels=1;

  // Stacking check
  let stackOk=false;
  if(stackEnabled && loadedHeight*2<=c.H){
    maxPallets=floor.count*2;
    levels=2;
    stackOk=true;
  }

  // Weights
  const totalPalletWeight=qty*p.palletWeight;
  const totalCargoWeight=qty*cargoWeightPerPallet;
  const totalWeight=totalPalletWeight+totalCargoWeight;
  const payloadPct=(totalWeight/c.payload)*100;

  // Floor usage
  const floorAreaContainer=(c.L*c.W)/1e6; // m²
  const usedPalletsFloor=Math.min(qty, floor.count);
  const usedFloorArea=(usedPalletsFloor*p.W*p.L)/1e6;
  const unusedFloorArea=floorAreaContainer-usedFloorArea;
  const unusedFloorPct=((unusedFloorArea/floorAreaContainer)*100);

  // Volume
  const volContainer=(c.L*c.W*c.H)/1e9;
  const usedVol=(Math.min(qty,maxPallets)*p.W*p.L*loadedHeight)/1e9;
  const unusedVolPct=((volContainer-usedVol)/volContainer)*100;

  // Status
  const palletStatus=qty<=maxPallets?'ok':(qty<=maxPallets*1.1?'warn':'danger');
  const weightStatus=payloadPct<=85?'ok':(payloadPct<=100?'warn':'danger');
  const weightLabel=payloadPct<=85?'OK':(payloadPct<=100?'Limite':`DÉPASSÉ`);

  // Display
  renderResults({
    c,p,qty,maxPallets,levels,stackOk,
    totalWeight,totalPalletWeight,totalCargoWeight,payloadPct,
    floorAreaContainer,usedFloorArea,unusedFloorArea,unusedFloorPct,
    volContainer,usedVol,unusedVolPct,
    palletStatus,weightStatus,weightLabel,
    loadedHeight,cargoWeightPerPallet,floor,mixedEnabled
  });
}

function renderContainerSVG(d, loadedPallets){
  const svgW=700, svgH=200;
  const margin={top:20,left:20,right:20,bottom:20};
  const cW=svgW-margin.left-margin.right;
  const cH=svgH-margin.top-margin.bottom;

  // Scale factor
  const scaleX=cW/d.c.L;
  const scaleY=cH/d.c.W;

  // Determine best orientation
  const pW_s=d.p.W*scaleX, pL_s=d.p.L*scaleX;
  const rowsA=Math.floor(d.c.W/d.p.W), colsA=Math.floor(d.c.L/d.p.L);
  const rowsB=Math.floor(d.c.W/d.p.L), colsB=Math.floor(d.c.L/d.p.W);
  const useA=(rowsA*colsA>=rowsB*colsB)||!d.mixedEnabled;

  let rects=[];
  let count=0;
  if(useA){
    outer: for(let col=0;col<colsA;col++){
      for(let row=0;row<rowsA;row++){
        if(count>=loadedPallets)break outer;
        const x=margin.left+col*d.p.L*scaleX;
        const y=margin.top+row*d.p.W*scaleY;
        rects.push({x,y,w:d.p.L*scaleX,h:d.p.W*scaleY,loaded:true});
        count++;
      }
    }
  } else {
    outer: for(let col=0;col<colsB;col++){
      for(let row=0;row<rowsB;row++){
        if(count>=loadedPallets)break outer;
        const x=margin.left+col*d.p.W*scaleX;
        const y=margin.top+row*d.p.L*scaleY;
        rects.push({x,y,w:d.p.W*scaleX,h:d.p.L*scaleY,loaded:true});
        count++;
      }
    }
  }

  const rectsHTML=rects.map((r,i)=>`
    <rect x="${r.x.toFixed(1)}" y="${r.y.toFixed(1)}" width="${(r.w-1).toFixed(1)}" height="${(r.h-1).toFixed(1)}"
      fill="${r.loaded?'rgba(0,122,100,0.18)':'rgba(200,210,220,0.3)'}" stroke="${r.loaded?'#007a64':'#ccd6e0'}" stroke-width="1" rx="1"/>
    <text x="${(r.x+r.w/2).toFixed(1)}" y="${(r.y+r.h/2+4).toFixed(1)}" text-anchor="middle" fill="${r.loaded?'#007a64':'#99aabb'}" font-size="8" font-family="JetBrains Mono,monospace">${i+1}</text>
  `).join('');

  return `<svg viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">
    <!-- Container outline -->
    <rect x="${margin.left}" y="${margin.top}" width="${cW}" height="${cH}" fill="rgba(240,243,247,0.8)" stroke="#a8bcda" stroke-width="2" rx="2"/>
    <!-- Door end indicator -->
    <rect x="${margin.left+cW-8}" y="${margin.top}" width="8" height="${cH}" fill="rgba(196,127,0,0.08)" stroke="none"/>
    <text x="${margin.left+cW-4}" y="${margin.top+cH/2}" text-anchor="middle" fill="#c47f00" font-size="8" font-family="JetBrains Mono,monospace" transform="rotate(90,${margin.left+cW-4},${margin.top+cH/2})">PORTE</text>
    <!-- Pallets -->
    ${rectsHTML}
    <!-- Labels -->
    <text x="${margin.left+4}" y="${margin.top-6}" fill="#7a8fa6" font-size="9" font-family="JetBrains Mono,monospace">${(d.c.L/1000).toFixed(2)}m</text>
    <text x="${margin.left-2}" y="${margin.top+cH/2}" fill="#7a8fa6" font-size="9" font-family="JetBrains Mono,monospace" transform="rotate(-90,${margin.left-12},${margin.top+cH/2})">${(d.c.W/1000).toFixed(2)}m</text>
    <!-- Legend -->
    <rect x="${svgW-140}" y="${svgH-18}" width="12" height="10" fill="rgba(0,122,100,0.18)" stroke="#007a64" stroke-width="1"/>
    <text x="${svgW-124}" y="${svgH-9}" fill="#7a8fa6" font-size="9" font-family="JetBrains Mono,monospace">Palette chargée (${loadedPallets})</text>
  </svg>`;
}

};

function observeReveal(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach((e,i)=>{if(e.isIntersecting){setTimeout(()=>e.target.classList.add('visible'),i*35);obs.unobserve(e.target);}});
  },{threshold:.05});
  document.querySelectorAll('.reveal:not(.visible)').forEach(el=>obs.observe(el));
}

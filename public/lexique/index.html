<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexique Douanier Premium - SiteDemo1</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a3a52;
            --accent: #d4af37;
            --accent-light: #f4d03f;
            --bg: #f8f6f1;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #e8e3dd;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, var(--bg) 0%, #efefeb 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, #0f2438 100%);
            color: white;
            padding: 60px 40px;
            text-align: center;
            border-radius: 15px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5em;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
            letter-spacing: -1px;
        }

        header p {
            font-size: 1.15em;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .header-accent {
            color: var(--accent-light);
            font-weight: 700;
        }

        /* ===== SEARCH SECTION ===== */
        .search-section {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 12px;
            margin-bottom: 35px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            border-top: 3px solid var(--accent);
        }

        .search-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8em;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .search-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .search-grid {
                grid-template-columns: 1fr;
            }
        }

        .search-input-group {
            position: relative;
        }

        .search-input-group label {
            display: block;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-input-group input,
        .search-input-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05em;
            color: var(--text);
            transition: all 0.3s ease;
        }

        .search-input-group input:focus,
        .search-input-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        /* ===== ALPHABET BUTTONS ===== */
        .alphabet-section {
            margin-bottom: 25px;
        }

        .alphabet-title {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 12px;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 0.5px;
        }

        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
            gap: 8px;
        }

        .letter-btn {
            aspect-ratio: 1;
            border: 2px solid var(--border);
            background: white;
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95em;
            transition: all 0.25s ease;
            font-family: 'Playfair Display', serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .letter-btn:hover {
            border-color: var(--accent);
            background: rgba(212, 175, 55, 0.05);
            transform: translateY(-2px);
        }

        .letter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(26, 58, 82, 0.3);
        }

        /* ===== BUTTONS ===== */
        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 28px;
            border: none;
            border-radius: 6px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent);
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(26, 58, 82, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ===== RESULTS SECTION ===== */
        .results-section {
            margin-top: 40px;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .results-title {
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            color: var(--primary);
        }

        .results-count {
            background: rgba(212, 175, 55, 0.15);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.95em;
        }

        /* ===== GLOSSARY LIST ===== */
        .glossary-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .glossary-item {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .glossary-item:hover {
            border-color: var(--accent);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.1);
        }

        .glossary-item-header {
            padding: 18px 24px;
            background: linear-gradient(90deg, rgba(26, 58, 82, 0.02) 0%, transparent 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
        }

        .glossary-item.expanded .glossary-item-header {
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%);
            border-bottom-color: var(--accent);
        }

        .glossary-item-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.4em;
            color: var(--primary);
            font-weight: 700;
            margin: 0;
        }

        .glossary-item-toggle {
            color: var(--accent);
            font-size: 1.4em;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }

        .glossary-item.expanded .glossary-item-toggle {
            transform: rotate(180deg);
        }

        .glossary-item-definition {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            padding: 0 24px;
            font-size: 1.05em;
            line-height: 1.8;
            color: var(--text-light);
        }

        .glossary-item.expanded .glossary-item-definition {
            max-height: 600px;
            padding: 20px 24px 24px;
        }

        /* ===== LOADING & EMPTY STATES ===== */
        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 20px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-results {
            text-align: center;
            padding: 80px 40px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 2px solid var(--border);
        }

        .no-results h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8em;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .no-results p {
            color: var(--text-light);
            font-size: 1.1em;
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-light);
            margin-top: 60px;
            border-top: 1px solid var(--border);
        }

        /* ===== ANTI-SCRAPING ===== */
        .anti-scrape {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        body {
            -webkit-touch-callout: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <h1>📚 Lexique <span class="header-accent">Douanier</span></h1>
            <p>Glossaire officiel des termes douaniers internationaux</p>
        </header>

        <!-- SEARCH SECTION -->
        <div class="search-section anti-scrape">
            <h2 class="search-title">Rechercher</h2>
            
            <div class="search-grid">
                <div class="search-input-group">
                    <label for="search-input">🔍 Par mot-clé</label>
                    <input 
                        type="text" 
                        id="search-input" 
                        placeholder="Ex: tarif, douane, commerce..."
                        autocomplete="off"
                    >
                </div>

                <div class="search-input-group">
                    <label for="dropdown-select">📋 Par catégorie</label>
                    <select id="dropdown-select">
                        <option value="">Toutes les catégories</option>
                        <option value="accord">Accords commerciaux</option>
                        <option value="tarif">Tarifs & Droits</option>
                        <option value="operation">Opérations douanières</option>
                    </select>
                </div>
            </div>

            <!-- ALPHABET -->
            <div class="alphabet-section">
                <div class="alphabet-title">Ou parcourir par lettre</div>
                <div class="alphabet-grid">
                    <button class="letter-btn" data-letter="A">A</button>
                    <button class="letter-btn" data-letter="B">B</button>
                    <button class="letter-btn" data-letter="C">C</button>
                    <button class="letter-btn" data-letter="D">D</button>
                    <button class="letter-btn" data-letter="E">E</button>
                    <button class="letter-btn" data-letter="F">F</button>
                    <button class="letter-btn" data-letter="G">G</button>
                    <button class="letter-btn" data-letter="H">H</button>
                    <button class="letter-btn" data-letter="I">I</button>
                    <button class="letter-btn" data-letter="J">J</button>
                    <button class="letter-btn" data-letter="K">K</button>
                    <button class="letter-btn" data-letter="L">L</button>
                    <button class="letter-btn" data-letter="M">M</button>
                    <button class="letter-btn" data-letter="N">N</button>
                    <button class="letter-btn" data-letter="O">O</button>
                    <button class="letter-btn" data-letter="P">P</button>
                    <button class="letter-btn" data-letter="Q">Q</button>
                    <button class="letter-btn" data-letter="R">R</button>
                    <button class="letter-btn" data-letter="S">S</button>
                    <button class="letter-btn" data-letter="T">T</button>
                    <button class="letter-btn" data-letter="U">U</button>
                    <button class="letter-btn" data-letter="V">V</button>
                    <button class="letter-btn" data-letter="W">W</button>
                    <button class="letter-btn" data-letter="X">X</button>
                    <button class="letter-btn" data-letter="Y">Y</button>
                    <button class="letter-btn" data-letter="Z">Z</button>
                </div>
            </div>

            <!-- BUTTONS -->
            <div class="button-group" style="margin-top: 25px;">
                <button class="btn-primary" id="clear-btn">🔄 Réinitialiser</button>
            </div>
        </div>

        <!-- RESULTS -->
        <div class="results-section">
            <div class="results-header">
                <h2 class="results-title">Résultats</h2>
                <div class="results-count" id="results-count">Chargement...</div>
            </div>
            <div id="results-container">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Chargement du glossaire...</p>
                </div>
            </div>
        </div>

        <!-- FOOTER -->
        <footer>
            <p>© 2026 Lexique Douanier Officiel | Tous droits réservés</p>
        </footer>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        // ===== VARIABLES GLOBALES =====
        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
        
        let allGlossaire = [];
        let filteredGlossaire = [];
        let expandedItems = new Set();
        let currentFilters = {
            searchTerm: '',
            letter: '',
            category: ''
        };

        // Rate limiting anti-scraping
        let requestCount = 0;
        const MAX_REQUESTS_PER_MINUTE = 30;
        
        // ===== CHARGER LES DONNÉES =====
        async function loadGlossaire() {
            try {
                const { data, error } = await supabaseClient
                    .from(SUPABASE_CONFIG.tableName)
                    .select('*')
                    .order('titre', { ascending: true });

                if (error) throw error;

                allGlossaire = data || [];
                filteredGlossaire = [...allGlossaire];
                updateResults();
            } catch (err) {
                console.error('Erreur Supabase:', err);
                showError('Erreur de connexion aux données');
            }
        }

        // ===== AFFICHER LES RÉSULTATS =====
        function displayResults() {
            const container = document.getElementById('results-container');
            const count = document.getElementById('results-count');

            if (filteredGlossaire.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <h3>Aucun résultat</h3>
                        <p>Essayez une autre recherche ou modifiez vos filtres</p>
                    </div>
                `;
                count.textContent = `0 résultat`;
                return;
            }

            container.innerHTML = filteredGlossaire.map((item, idx) => `
                <div class="glossary-item ${expandedItems.has(idx) ? 'expanded' : ''}" data-index="${idx}">
                    <div class="glossary-item-header">
                        <h3 class="glossary-item-title">${escapeHtml(item.titre)}</h3>
                        <span class="glossary-item-toggle">▼</span>
                    </div>
                    <div class="glossary-item-definition">
                        ${escapeHtml(item.definition)}
                    </div>
                </div>
            `).join('');

            // Event listeners pour l'expansion
            document.querySelectorAll('.glossary-item').forEach((el, idx) => {
                el.addEventListener('click', () => toggleExpand(idx));
            });

            count.textContent = `${filteredGlossaire.length} résultat${filteredGlossaire.length > 1 ? 's' : ''}`;
        }

        // ===== TOGGLE EXPANSION =====
        function toggleExpand(index) {
            if (expandedItems.has(index)) {
                expandedItems.delete(index);
            } else {
                expandedItems.add(index);
            }
            displayResults();
        }

        // ===== APPLIQUER FILTRES =====
        function applyFilters() {
            // Anti-scraping: rate limiting
            requestCount++;
            if (requestCount > MAX_REQUESTS_PER_MINUTE) {
                console.warn('Trop de requêtes');
                return;
            }

            filteredGlossaire = allGlossaire.filter(item => {
                if (currentFilters.searchTerm) {
                    const term = currentFilters.searchTerm.toLowerCase();
                    const matches = item.titre.toLowerCase().includes(term) ||
                                  item.definition.toLowerCase().includes(term);
                    if (!matches) return false;
                }

                if (currentFilters.letter) {
                    const firstLetter = item.titre.charAt(0).toUpperCase();
                    if (firstLetter !== currentFilters.letter.toUpperCase()) return false;
                }

                return true;
            });

            displayResults();
        }

        // ===== EVENT LISTENERS =====
        document.getElementById('search-input').addEventListener('input', (e) => {
            currentFilters.searchTerm = e.target.value;
            expandedItems.clear();
            applyFilters();
        });

        document.querySelectorAll('.letter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const letter = btn.dataset.letter;
                if (currentFilters.letter === letter) {
                    currentFilters.letter = '';
                } else {
                    currentFilters.letter = letter;
                }
                
                document.querySelectorAll('.letter-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.letter === currentFilters.letter);
                });
                
                expandedItems.clear();
                applyFilters();
            });
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            currentFilters = { searchTerm: '', letter: '', category: '' };
            document.getElementById('search-input').value = '';
            document.getElementById('dropdown-select').value = '';
            document.querySelectorAll('.letter-btn').forEach(btn => btn.classList.remove('active'));
            expandedItems.clear();
            applyFilters();
        });

        // ===== UTILITAIRES =====
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function showError(message) {
            document.getElementById('results-container').innerHTML = `
                <div class="no-results">
                    <h3>⚠️ Erreur</h3>
                    <p>${message}</p>
                </div>
            `;
        }

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', loadGlossaire);

        // Anti-scraping: Disable context menu
        document.addEventListener('contextmenu', (e) => {
            if (e.target.closest('.anti-scrape')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
